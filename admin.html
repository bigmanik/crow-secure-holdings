<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Crow Secure Holdings</title>
  <link rel="stylesheet" href="/src/style.css"/>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <!-- NAV -->
  
  <header class="bg-black text-white flex items-center justify-between px-5 py-2 h-24 ">
  <span class="mr-auto ">
    <img src="/src/assets/crow.jpg" alt="Logo" class="w-24 h-24 md:w-32 md:h-32 object-contain "></span>

   <!-- Hamburger Button (mobile only) -->
 

   <!-- Hamburger Button -->
<button
  id="hamburger"
  class="md:hidden flex flex-col justify-center items-center gap-1.5 z-50 relative"
>
  <span class="block w-6 h-0.5 bg-white"></span>
  <span class="block w-6 h-0.5 bg-white"></span>
  <span class="block w-6 h-0.5 bg-white"></span>
</button>

<!-- Desktop Nav -->
<ul class="hidden md:flex justify-center space-x-10 font-bold text-lg mr-10">
  <li class="cursor-pointer"><a href="dashboard.html">Dashboard</a> </li>
       <li class="cursor-pointer"><a href="#">Deposit</a> </li>
  <li class="cursor-pointer"><a href="#withdraw-section">Withdraw</a> </li>
  <li class="cursor-pointer"><a href="#history-section">History</a></li>
        <li class="cursor-pointer"  id="logoutBtn">Logout </li>
  <!-- <li class="cursor-pointer">Contact</li> -->
</ul>

<!-- Overlay (click outside to close) -->
<div
  id="menu-overlay"
  class="md:hidden fixed inset-0 bg-black/30 z-40
         opacity-0 pointer-events-none transition-opacity duration-300"
></div>

<!-- Mobile Menu -->
<ul
  id="mobile-menu"
  class="md:hidden fixed top-0 right-0 h-screen w-3/4 bg-black/80 backdrop-blur-sm
         flex flex-col items-center justify-center gap-8
         font-bold text-lg z-50
         translate-x-full opacity-0 transition-all duration-300 ease-in-out"
>
  <!-- X Close Button -->
  <button id="close-btn" class="absolute top-6 right-6 text-white">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

 <li class="cursor-pointer"><a href="dashboard.html">Dashboard</a> </li>
      <li class="cursor-pointer"><a href="#">Deposit</a> </li>
  <li class="cursor-pointer"><a href="#withdraw-section">Withdraw</a> </li>
  <li class="cursor-pointer"><a href="#history-section">History</a></li>
     <li class="cursor-pointer" id="logoutBtn">Logout </li>

  <!-- <li class="cursor-pointer">Contact</li> -->
</ul>
</header>



  <main class="max-w-6xl mx-auto px-6 py-10">

    <!-- USERS PANEL -->
    <div id="panel-users">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold text-white">All Users</h2>
        <span id="user-count" class="text-xs text-gray-500"></span>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wider">
              <th class="text-left px-5 py-3">Name</th>
              <th class="text-left px-5 py-3">Email</th>
              <th class="text-left px-5 py-3">Balance</th>
              <th class="text-left px-5 py-3">Role</th>
              <th class="text-left px-5 py-3">Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="5" class="px-5 py-6 text-gray-500">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- WITHDRAWALS PANEL -->
    <div id="panel-withdrawals" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold text-white">Withdrawal Requests</h2>
        <span id="pending-count" class="text-xs text-yellow-500"></span>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wider">
              <th class="text-left px-5 py-3">User</th>
              <th class="text-left px-5 py-3">Amount</th>
              <th class="text-left px-5 py-3">Wallet</th>
              <th class="text-left px-5 py-3">Status</th>
              <th class="text-left px-5 py-3">Actions</th>
            </tr>
          </thead>
          <tbody id="withdrawals-tbody">
            <tr><td colspan="5" class="px-5 py-6 text-gray-500">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Deposit / PnL Modal -->
  <div id="modal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 w-full max-w-sm mx-4">
      <h3 id="modal-title" class="text-white font-semibold mb-4">Action</h3>
      <input id="modal-amount" type="number" placeholder="Amount (USD)"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none mb-3"/>
      <!-- PnL-only fields -->
      <div id="pnl-fields" class="hidden">
        <select id="modal-mode"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white mb-3 focus:outline-none">
          <option value="fixed">Fixed amount</option>
          <option value="percent">Percentage of principal</option>
        </select>
        <input id="modal-note" type="text" placeholder="Note (e.g. Week 1 returns)"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none mb-3"/>
      </div>
      <p id="modal-error" class="text-red-400 text-xs mb-3 hidden"></p>
      <div class="flex gap-3">
        <button id="modal-cancel"
          class="flex-1 border border-gray-700 text-gray-300 text-sm py-2.5 rounded-lg hover:bg-gray-800 transition">
          Cancel
        </button>
        <button id="modal-confirm"
          class="flex-1 bg-white text-gray-900 font-semibold text-sm py-2.5 rounded-lg hover:bg-gray-200 transition">
          Confirm
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>

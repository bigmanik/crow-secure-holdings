<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Crow Secure Holdings</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

 
   <header class="bg-black text-white flex items-center justify-between px-5 py-2 h-24 ">
  <span class="mr-auto ">
    <img src="/src/assets/crow.jpg" alt="Logo" class="w-24 h-24 md:w-32 md:h-32 object-contain "></span>

   <!-- Hamburger Button (mobile only) -->
 

   <!-- Hamburger Button -->
<button
  id="hamburger"
  class="md:hidden flex flex-col justify-center items-center gap-1.5 z-50 relative"
>
  <span class="block w-6 h-0.5 bg-white"></span>
  <span class="block w-6 h-0.5 bg-white"></span>
  <span class="block w-6 h-0.5 bg-white"></span>
</button>

<!-- Desktop Nav -->
<ul class="hidden md:flex justify-center space-x-10 font-bold text-lg mr-10">
  <li class="cursor-pointer"><a href="dashboard.html">Dashboard</a> </li>
       <li class="cursor-pointer"><a href="#">Deposit</a> </li>
  <li class="cursor-pointer"><a href="#withdraw-section">Withdraw</a> </li>
  <li class="cursor-pointer"><a href="#history-section">History</a></li>
        <li class=" logoutBtn cursor-pointer"  >Logout </li>
  
</ul>

<!-- Overlay (click outside to close) -->
<div
  id="menu-overlay"
  class="md:hidden fixed inset-0 bg-black/30 z-40
         opacity-0 pointer-events-none transition-opacity duration-300"
></div>

<!-- Mobile Menu -->
<ul
  id="mobile-menu"
  class="md:hidden fixed top-0 right-0 h-screen w-3/4 bg-black/80 backdrop-blur-sm
         flex flex-col items-center justify-center gap-8
         font-bold text-lg z-50
         translate-x-full opacity-0 transition-all duration-300 ease-in-out"
>
  <!-- X Close Button -->
  <button id="close-btn" class="absolute top-6 right-6 text-white">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

 <li class="cursor-pointer"><a href="dashboard.html">Dashboard</a> </li>
      <li class="cursor-pointer"><a href="#">Deposit</a> </li>
  <li class="cursor-pointer"><a href="#withdraw-section">Withdraw</a> </li>
  <li class="cursor-pointer"><a href="#history-section">History</a></li>
     <li class="logoutBtn cursor-pointer" >Logout </li>

 
</ul>
</header>

  <main class="max-w-5xl mx-auto px-6 py-10">

    <!-- Greeting -->
    <div class="mb-8">
      <p class="text-gray-400 text-sm mb-1">Welcome back,</p>
      <h1 id="user-name" class="text-2xl font-semibold text-white">—</h1>
    </div>

    <!-- Stat Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <p class="text-gray-400 text-xs uppercase tracking-widest mb-2">Current Balance</p>
        <p id="stat-balance" class="text-3xl font-semibold text-white">—</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <p class="text-gray-400 text-xs uppercase tracking-widest mb-2">Total P&amp;L</p>
        <p id="stat-pnl" class="text-3xl font-semibold text-green-400">—</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <p class="text-gray-400 text-xs uppercase tracking-widest mb-2">Total Withdrawn</p>
        <p id="stat-withdrawn" class="text-3xl font-semibold text-white">—</p>
      </div>
    </div>

    <!-- Transaction History -->
    <div id="history-section" class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-8">
      <h2 class="text-sm font-semibold text-white mb-4">Transaction History</h2>
      <div id="tx-list" class="divide-y divide-gray-800 text-sm">
        <p class="text-gray-500 py-4">Loading...</p>
      </div>
    </div>

    <!-- Withdrawal Request -->
    <div id="withdraw-section" class="bg-gray-900 border border-gray-800 rounded-xl p-6">
      <h2 class="text-sm font-semibold text-white mb-1">Request Withdrawal</h2>
      <p class="text-gray-500 text-xs mb-4">Withdrawals are reviewed within 24 hours.</p>
      <div class="flex flex-col sm:flex-row gap-3">
        <input
          id="withdraw-amount"
          type="number"
          placeholder="Amount (USD)"
          class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-gray-500"
        />
        <input
          id="withdraw-wallet"
          type="text"
          placeholder="Wallet address"
          class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-gray-500"
        />
        <button
          id="withdraw-btn"
          class="bg-white text-gray-900 font-semibold text-sm px-6 py-2.5 rounded-lg hover:bg-gray-200 transition whitespace-nowrap"
        >
          Submit
        </button>
      </div>
      <p id="withdraw-msg" class="mt-3 text-sm hidden"></p>
    </div>

  </main>

  <script type="module" src="/src/dashboard.js"></script>
</body>
</html>
